name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build RPython 
      working-directory: rpython/jit-interp/__rust__
      run: cargo build --release

    - name: Prepare Runtime Environment
      run: |

        cp rpython/jit-interp/__rust__/target/release/librpython.so rpython/tests/rpython.so
        cd rpython/tests
        ls -la 

    - name: Execute JIT Tests 
      working-directory: rpython/tests
      run: |
        for i in {1..9}; do
          echo "Running test${i}.ry..."
          python3 run.py test${i}.ry
          if [ $? -ne 0 ]; then
            echo "Test test${i}.ry FAILED"
            exit 1
          fi
        done
        echo "All tests passed successfully!"